    <style>
        /* Genel sayfa ayarları */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Special Elite', monospace; /* Daktilo fontu aktif */
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
        }

        /* Arka plan videosunun ayarları */
        #arka-plan-videosu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -2;
            opacity: 0;
            transition: opacity 2s ease;
        }

        /* Video üzerine gelen hafif karanlık katman */
        #video-karartma {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.6); /* Neon daha iyi parlasın diye biraz daha koyulaştırdık */
            z-index: -1;
            opacity: 0;
            transition: opacity 2s ease;
        }

        /* İlk baştaki tıklama ekranı */
        #karanlik-ekran {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            letter-spacing: 2px;
            cursor: pointer;
            z-index: 9999;
            transition: opacity 1.5s ease, visibility 1.5s ease;
        }

        /* İlk baştaki yazının yavaşça yanıp sönme ve neon efekti */
        .titresim {
            animation: nefes-al 3s infinite ease-in-out;
            color: #fff;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #fff,
                0 0 40px #fff;
        }

        @keyframes nefes-al {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* JavaScript ile eklenecek gizleme/gösterme sınıfları */
        .gizle {
            opacity: 0;
            visibility: hidden;
        }

        .goster {
            opacity: 1 !important;
        }

        /* İçerik tasarımı */
        #ana-icerik {
            text-align: center;
            z-index: 1;
            opacity: 0;
            transition: opacity 2s ease 0.5s;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* 'hamish.xxl' başlığı - Daktilo fontu ve Beyaz Neon */
        .lexsad-baslik {
            font-size: 4.5rem;
            letter-spacing: 5px;
            margin-bottom: 30px;
            color: #fff;
            /* Güçlü Beyaz Neon Parlaması */
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #fff,
                0 0 40px rgba(255, 255, 255, 0.8),
                0 0 80px rgba(255, 255, 255, 0.6),
                0 0 100px rgba(255, 255, 255, 0.4);
        }

        /* Sosyal linklerin konteyneri */
        #sosyal-linkler {
            display: flex;
            gap: 25px;
            flex-wrap: wrap; 
            justify-content: center;
            max-width: 80%; 
        }

        /* Minik sade sosyal medya ikonları */
        .sosyal-item {
            text-decoration: none;
            color: white;
            opacity: 0.7; 
            transition: all 0.3s ease;
        }

        /* İkonların üzerine gelinceki beyaz neon animasyonu */
        .sosyal-item:hover {
            opacity: 1;
            transform: translateY(-5px) scale(1.1);
        }

        .sosyal-item:hover .sade-ikon {
            /* Üzerine gelince ikonlar da beyaz neon ile parlar */
            filter: drop-shadow(0 0 8px #fff) drop-shadow(0 0 20px #fff);
        }

        /* İkonların boyut ayarları */
        .sade-ikon {
            width: 30px;
            height: 30px;
            fill: currentColor;
            /* İkonların normal halindeki hafif parlama */
            filter: drop-shadow(0 0 3px rgba(255,255,255,0.5));
            transition: filter 0.3s ease;
        }
    </style>

    <script>
        const karanlikEkran = document.getElementById('karanlik-ekran');
        const video = document.getElementById('arka-plan-videosu');
        const karartma = document.getElementById('video-karartma');
        const icerik = document.getElementById('ana-icerik');

        karanlikEkran.addEventListener('click', function() {
            // Siyah ekranı gizle
            karanlikEkran.classList.add('gizle');

            // Videoyu ve siyah katmanı göster
            video.classList.add('goster');
            karartma.classList.add('goster');
            video.play();

            // Ana içeriği göster
            icerik.classList.add('goster');
        });
    </script>
